<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="20" fill="#ECFDF5"/>
  <g transform="translate(55, 40)">
    <!-- Feather small -->
    <path d="M20 5 C30 15, 38 30, 40 55" stroke="#92400E" stroke-width="1.5" fill="none"/>
    <path d="M20 5 C12 10, 8 20, 10 30 C14 25, 18 18, 20 15" fill="#F59E0B" opacity="0.8"/>
    <path d="M22 15 C14 22, 8 32, 12 42 C15 35, 20 28, 25 25" fill="#FBBF24" opacity="0.7"/>
    <path d="M20 5 C28 8, 35 15, 32 28 C30 22, 26 18, 20 15" fill="#D97706" opacity="0.8"/>
    <path d="M22 15 C32 20, 37 30, 34 42 C32 35, 28 28, 25 25" fill="#F59E0B" opacity="0.7"/>
  </g>
  <g transform="translate(120, 40)">
    <!-- Basketball small -->
    <circle cx="0" cy="0" r="28" fill="#EA580C"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#C2410C" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="28" ry="10" fill="none" stroke="#9A3412" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="10" ry="28" fill="none" stroke="#9A3412" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Equals sign -->
  <line x1="85" y1="42" x2="115" y2="42" stroke="#059669" stroke-width="3" stroke-linecap="round"/>
  <line x1="85" y1="52" x2="115" y2="52" stroke="#059669" stroke-width="3" stroke-linecap="round"/>
  <!-- Ground line -->
  <line x1="30" y1="120" x2="170" y2="120" stroke="#6B7280" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Both arrows pointing down -->
  <line x1="55" y1="75" x2="55" y2="115" stroke="#059669" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="120" y1="75" x2="120" y2="115" stroke="#059669" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#059669"/>
    </marker>
  </defs>
  <!-- Label -->
  <text x="100" y="150" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#059669">Same Time!</text>
  <text x="100" y="185" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#065F46">Both Together</text>
</svg>
