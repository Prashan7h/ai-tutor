<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="20" fill="#FEE2E2"/>
  <g transform="translate(100, 95)">
    <!-- Ball -->
    <circle cx="0" cy="0" r="55" fill="#EA580C"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#C2410C" stroke-width="2"/>
    <!-- Seam lines -->
    <ellipse cx="0" cy="0" rx="55" ry="20" fill="none" stroke="#9A3412" stroke-width="2" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="20" ry="55" fill="none" stroke="#9A3412" stroke-width="2" opacity="0.6"/>
    <line x1="-55" y1="0" x2="55" y2="0" stroke="#9A3412" stroke-width="2" opacity="0.4"/>
    <line x1="0" y1="-55" x2="0" y2="55" stroke="#9A3412" stroke-width="2" opacity="0.4"/>
    <!-- Highlight -->
    <ellipse cx="-18" cy="-20" rx="15" ry="10" fill="white" opacity="0.2" transform="rotate(-30)"/>
  </g>
  <!-- Label -->
  <text x="100" y="185" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#9A3412">Basketball</text>
</svg>
